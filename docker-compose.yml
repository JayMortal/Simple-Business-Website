services:
  web:
    build: .
    container_name: simple-business-web
    restart: unless-stopped
    ports:
      - "${PORT:-14514}:14514"
    volumes:
      # Only the data/ directory is persisted — source code is baked into the image.
      # This means `docker compose up -d --build` always delivers the latest code,
      # and data (site content + admin password) is never lost on update.
      - ./data:/app/data
    env_file:
      - .env

# ── First-time deployment ──────────────────────────────────────────
#
#  1. Clone the repository
#     git clone https://github.com/your-username/Simple-Business-Websitebuilder.git
#     cd Simple-Business-Websitebuilder
#
#  2. Create environment file
#     cp .env.example .env
#     nano .env          # set ADMIN_PASSWORD and SESSION_SECRET
#
#  3. Create the data directory (persisted across updates)
#     mkdir -p data
#
#  4. Build and start
#     docker compose up -d --build
#
#  5. Configure reverse proxy in 1Panel / aaPanel:
#     Proxy target: http://127.0.0.1:14514
#
# ── Updating to a new version ─────────────────────────────────────
#
#  git pull && docker compose up -d --build
#
#  Your site content (data/site-data.json) is preserved automatically.
#  The browser will always load fresh HTML/JS/CSS because the server
#  sends Cache-Control: no-cache on all HTML responses.
#
# ── Port ──────────────────────────────────────────────────────────
#
#  Default host port: 14514
#  Change in .env: PORT=your_port
#  Then restart: docker compose up -d
