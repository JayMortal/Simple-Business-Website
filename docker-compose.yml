services:
  web:
    build: .
    container_name: globaltrade-web
    restart: unless-stopped
    ports:
      - "14514:80"
    volumes:
      - ./data/site-data.json:/var/www/html/site-data.json
      - ./data/api-state.json:/var/www/html/api-state.json
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data

# ── 首次部署步骤 ──────────────────────────────────────────────────
#
# 1. 克隆项目
#    git clone https://github.com/JayMortal/Simple-Business-Websitebuilder.git
#    cd Simple-Business-Websitebuilder
#
# 2. 初始化数据目录（自动处理权限）
#    mkdir -p data
#    echo '{}' > data/site-data.json
#    echo '{}' > data/api-state.json
#    chown 33:33 data/site-data.json data/api-state.json
#    chmod 664 data/site-data.json data/api-state.json
#
# 3. 启动容器
#    docker compose up -d --build
#
# ── 更新部署 ──────────────────────────────────────────────────────
#
#    bash update.sh
#
# ── 面板反向代理配置（1Panel / aaPanel 等）───────────────────────
#
#    代理地址: http://127.0.0.1:14514
#    SSL: 通过面板申请，无需容器内处理
#
# ── 端口说明 ──────────────────────────────────────────────────────
#
#    宿主机端口 14514 → 容器内 80
#    如需修改，将 "14514:80" 改为 "你的端口:80"
